<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Review</title>

<link rel="stylesheet" href="css/styles.css">
<script defer src="scripts/form.js"></script>

</head>

<body>

<header>
<h1>Product Review</h1>
</header>

<main>

<form method="get" action="review.html">

<label for="product">Product Name</label>
<select id="product" name="product" required>

<option value="" disabled selected>Select a Product ...</option>

</select>


<label>Overall Rating</label>

<div class="rating">

<label><input type="radio" name="rating" value="1" required> ☆</label>
<label><input type="radio" name="rating" value="2"> ☆☆</label>
<label><input type="radio" name="rating" value="3"> ☆☆☆</label>
<label><input type="radio" name="rating" value="4"> ☆☆☆☆</label>
<label><input type="radio" name="rating" value="5"> ☆☆☆☆☆</label>

</div>


<label for="install">Date of Installation</label>
<input type="date" id="install" name="install" required>


<label>Which features did you find useful?</label>

<label>
<input type="checkbox" name="features" value="Durability">
Durability
</label>

<label>
<input type="checkbox" name="features" value="Ease of Use">
Ease of Use
</label>

<label>
<input type="checkbox" name="features" value="Performance">
Performance
</label>

<label>
<input type="checkbox" name="features" value="Design">
Design
</label>


<label for="review">Written Review</label>
<textarea id="review" name="review"></textarea>


<label for="username">Your Name</label>
<input type="text" id="username" name="username">


<input type="submit" value="Post Review">

</form>

</main>

<footer>

<p>©2024 🌸 Rubia Magdelena Francesco 🌸 Madagascar</p>

</footer>

</body>
</html>
