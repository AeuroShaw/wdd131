<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibadan, Nigeria</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>

<body>

<header>
  <h1>Ibadan</h1>
</header>

<!-- HERO IMAGE -->
<section class="hero">
  <picture>
    <source srcset="images/ibadan-large.webp" media="(min-width: 768px)">
    <img src="images/ibadan-small.webp" alt="Ibadan city view">
  </picture>
</section>

<main>

  <section class="info">
    <h2>About</h2>
    <p>Ibadan is one of the largest cities in West Africa and rich in Yoruba culture and history.</p>
  </section>

  <section class="weather">
    <h2>Weather</h2>
    <p>Temperature: <span id="temp">28</span>°C</p>
    <p>Wind Speed: <span id="wind">10</span> km/h</p>
    <p>Wind Chill: <span id="windChill"></span></p>
  </section>

</main>

<footer>
  <p>&copy; <span id="year"></span></p>
  <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
</html>
